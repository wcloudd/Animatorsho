# Production docker-compose for Animatorsho
# Requirements: copy .env.example → .env and fill in all required variables before running.
#
# Quick start:
#   docker compose build
#   docker compose up -d
#   docker compose exec app php artisan key:generate
#   docker compose exec app php artisan migrate --force
#   docker compose exec app php artisan db:seed --class=AnimatorshoCourseSeeder --force
#   docker compose exec app php artisan db:seed --class=SmsTemplateSeeder --force
#   docker compose exec app php artisan config:cache
#   docker compose exec app php artisan route:cache
#   docker compose exec app php artisan view:cache

services:
  # -------------------------------------------------------
  # app — PHP-FPM application server
  # -------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: animatorsho-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    ports:
      - "${APP_PORT:-9080}:9000"
    environment:
      # Database: always point to the postgres service inside Docker
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
    volumes:
      # Uploaded and private files — must survive container restarts and redeploys
      - storage_data:/var/www/html/storage
      # Built public assets synced from the image at startup; read by nginx
      - public_assets:/var/www/html/public
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(0);'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # -------------------------------------------------------
  # nginx — reverse proxy + static asset server
  # -------------------------------------------------------
  #nginx:
  #  image: nginx:1.27-alpine
  #  restart: unless-stopped
  #  depends_on:
  #    - app
  #  ports:
  #    - "${NGINX_PORT:-80}:80"
  #  volumes:
  #    # Serve Vite-built assets and public media directly (no PHP roundtrip)
  #    - public_assets:/var/www/html/public:ro
  #    - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
  #  networks:
  #    - app_network

  # -------------------------------------------------------
  # postgres — PostgreSQL 16 database
  # -------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------
  # queue — Laravel queue worker (optional)
  # Processes queued jobs: SMS dispatches, notifications, etc.
  # Uncomment to enable. Safe to scale: docker compose up --scale queue=2
  # -------------------------------------------------------
  # queue:
  #   image: animatorsho-app
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   env_file: .env
  #   environment:
  #     DB_CONNECTION: pgsql
  #     DB_HOST: postgres
  #     DB_PORT: "5432"
  #   entrypoint: ["/usr/local/bin/entrypoint.sh"]
  #   command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
  #   volumes:
  #     - storage_data:/var/www/html/storage
  #   networks:
  #     - app_network

  # -------------------------------------------------------
  # scheduler — Laravel task scheduler (optional)
  # Runs `security:prune-events` daily and any future scheduled tasks.
  # One instance only — do not scale this service.
  # Alternative: add the cron entry to the host instead of running this container.
  # -------------------------------------------------------
  # scheduler:
  #   image: animatorsho-app
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   env_file: .env
  #   environment:
  #     DB_CONNECTION: pgsql
  #     DB_HOST: postgres
  #     DB_PORT: "5432"
  #   entrypoint: ["/usr/local/bin/entrypoint.sh"]
  #   command: ["php", "artisan", "schedule:work"]
  #   volumes:
  #     - storage_data:/var/www/html/storage
  #   networks:
  #     - app_network

volumes:
  postgres_data:
    driver: local
  storage_data:
    driver: local
  public_assets:
    driver: local

networks:
  app_network:
    driver: bridge
