; OPcache settings for production PHP-FPM.
; Mounted at /usr/local/etc/php/conf.d/99-opcache.ini inside the container.

[opcache]
opcache.enable                 = 1
opcache.enable_cli             = 0
opcache.memory_consumption     = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files  = 10000

; validate_timestamps=0 means PHP never checks if source files changed.
; Files are baked into the image, so this is safe and maximises performance.
; If you mount source code as a volume for debugging, set this to 1.
opcache.validate_timestamps    = 0
opcache.revalidate_freq        = 0

; save_comments=1 is required for Laravel's attribute-based PHP 8 annotations
opcache.save_comments          = 1

opcache.fast_shutdown          = 1
