; Production PHP settings for the Animatorsho Laravel application.
; Mounted at /usr/local/etc/php/conf.d/99-app.ini inside the container.

[PHP]
; Memory: enough for image processing, JSON encoding, and Composer-loaded classes
memory_limit = 256M

; File uploads: covers card-to-card receipt uploads (CARD_TO_CARD_RECEIPT_MAX_KB default 5120)
upload_max_filesize = 12M
post_max_size       = 15M

; Execution time: covers Zarinpal, SpotPlayer, and FarazSMS HTTP calls
max_execution_time = 60
max_input_time     = 60

; Session cookie security (Laravel manages sessions, but harden PHP defaults)
session.cookie_httponly = 1
session.cookie_samesite = Lax

; Error handling: log only, never display in production
display_errors   = Off
log_errors       = On
error_reporting  = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Timezone — matches APP_TIMEZONE=Asia/Tehran
date.timezone = Asia/Tehran

; Realpath cache: speeds up file lookups in production (files don't change)
realpath_cache_size = 4096K
realpath_cache_ttl  = 600
